# configs/default.yaml
# All hyperparameters in one place — override any field via CLI flag.

model:
  name: "distilbert-base-uncased"
  num_labels: 2
  max_len: 128          # tokens; covers ~95% of Jigsaw comments

data:
  dataset_name: "jigsaw_toxicity_pred"
  sample_size: 20000    # subset for Colab free tier
  train_ratio: 0.70
  val_ratio: 0.15
  test_ratio: 0.15      # must sum to 1.0

training:
  seed: 42
  epochs: 3
  batch_size: 32
  learning_rate: 2.0e-5
  weight_decay: 0.01
  warmup_ratio: 0.10    # fraction of total steps used for linear warmup
  grad_clip: 1.0        # max gradient norm
  patience: 2           # early stopping patience (epochs without val_f1 gain)
  checkpoint_dir: "checkpoints"

logging:
  log_every_n_steps: 50
  experiment_log: "experiments_log.json"