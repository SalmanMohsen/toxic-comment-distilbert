# configs/default.yaml
# All hyperparameters in one place — override any field via CLI flag.

model:
  name: "distilbert-base-uncased"
  num_labels: 2
  max_len: 128          # tokens; covers ~95% of Jigsaw comments

data:
  # Path to the Kaggle train.csv — fastest and most reliable.
  # Download from: https://www.kaggle.com/competitions/jigsaw-toxic-comment-classification-challenge/data
  # Set to null to use the HuggingFace parquet fallback (requires internet).
  csv_path: null
  sample_size: 10000    # 10k is safe for 2 GB VRAM; increase to 20000 on Colab T4
  train_ratio: 0.70
  val_ratio: 0.15
  test_ratio: 0.15      # must sum to 1.0

training:
  seed: 42
  epochs: 3
  batch_size: 16        # 16 fits in 2 GB VRAM (940MX); use 32 on Colab T4
  learning_rate: 2.0e-5
  weight_decay: 0.01
  warmup_ratio: 0.10    # fraction of total steps used for linear warmup
  grad_clip: 1.0        # max gradient norm
  patience: 2           # early stopping patience (epochs without val_f1 gain)
  checkpoint_dir: "checkpoints"

logging:
  log_every_n_steps: 50
  experiment_log: "experiments_log.json"